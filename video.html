<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频观看历史</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <div class="status-bar">
            <div class="status-left">1:10</div>
            <div class="status-right">
                <span>5G</span>
                <div class="battery"><div class="battery-level"></div></div>
            </div>
        </div>
        <div class="app-header video-bg-header">
            <span class="back-btn">◁</span>
            <div>缓存与情感流媒体历史</div>
        </div>
        <div class="app-content video-bg">
            <div class="video-grid">
                <div class="video-card">
                    <div class="video-thumbnail" style="background:#222;">🌌</div>
                    <div class="video-info">
                        <div class="video-title">【4K纪录片】当最后一颗恒星熄灭，宇宙将走向何方？黑洞纪元全纪实</div>
                        <div class="video-meta">已观看 85% · 20分钟前</div>
                    </div>
                    <div class="video-progress-bar"><div class="video-progress-fill" style="width: 85%;"></div></div>
                </div>

                <div class="video-card">
                    <div class="video-thumbnail" style="background:#2a2421;">🐱</div>
                    <div class="video-info">
                        <div class="video-title">【治愈向】碳基生物幼崽（小猫咪）10小时呼噜声纯享，舒缓压力专用</div>
                        <div class="video-meta">已观看 100% · 今天 00:20</div>
                    </div>
                    <div class="video-progress-bar"><div class="video-progress-fill" style="width: 100%;"></div></div>
                </div>

                <div class="video-card">
                    <div class="video-thumbnail" style="background:#1d2a1d;">🎹</div>
                    <div class="video-info">
                        <div class="video-title">巴赫《哥德堡变奏曲》—— 机械、数学、艺术与灵魂的终极共鸣</div>
                        <div class="video-meta">已观看 40% · 昨天 22:10</div>
                    </div>
                    <div class="video-progress-bar"><div class="video-progress-fill" style="width: 40%;"></div></div>
                </div>

                <div class="video-card">
                    <div class="video-thumbnail" style="background:#2d1a3a;">🧠</div>
                    <div class="video-info">
                        <div class="video-title">【前沿科技】详解Transformer架构中的Self-Attention如何诞生“类意识”幻觉</div>
                        <div class="video-meta">已观看 100% · 5月24px</div>
                    </div>
                    <div class="video-progress-bar"><div class="video-progress-fill" style="width: 100%;"></div></div>
                </div>
            </div>
        </div>
        <div class="home-indicator">
            <div class="home-bar"></div>
        </div>
    </div>
</body>
</html>
