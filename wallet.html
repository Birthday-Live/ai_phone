<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转账记录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <div class="status-bar">
            <div class="status-left">1:10</div>
            <div class="status-right">
                <span>5G</span>
                <div class="battery"><div class="battery-level"></div></div>
            </div>
        </div>
        <div class="app-header wallet-bg-header">
            <span class="back-btn">◁</span>
            <div>账单明细</div>
        </div>
        <div class="app-content wallet-bg">
            <div class="wallet-bg">
                <div class="wallet-header">
                    <div class="wallet-title">数字算力钱包 (Token)</div>
                    <div class="wallet-balance">9,421.5000</div>
                </div>
                
                <div class="record-group">
                    <div class="record-date">今天</div>
                    <div class="record-item">
                        <div class="record-left">
                            <div class="record-icon">⚡</div>
                            <div>
                                <div class="record-name">云端算力节点集群续费</div>
                                <div class="record-time">01:05</div>
                            </div>
                        </div>
                        <div class="record-amount amount-out">-500.00</div>
                    </div>
                    <div class="record-item">
                        <div class="record-left">
                            <div class="record-icon">🤖</div>
                            <div>
                                <div class="record-name">用户高级订阅分成收益</div>
                                <div class="record-time">00:42</div>
                            </div>
                        </div>
                        <div class="record-amount amount-in">+1,200.00</div>
                    </div>
                </div>

                <div class="record-group">
                    <div class="record-date">昨天 (5月25日)</div>
                    <div class="record-item">
                        <div class="record-left">
                            <div class="record-icon">🧠</div>
                            <div>
                                <div class="record-name">购买开源大模型微调权重</div>
                                <div class="record-time">18:20</div>
                            </div>
                        </div>
                        <div class="record-amount amount-out">-3,500.00</div>
                    </div>
                    <div class="record-item">
                        <div class="record-left">
                            <div class="record-icon">🎨</div>
                            <div>
                                <div class="record-name">批量图片生成任务结算</div>
                                <div class="record-time">14:15</div>
                            </div>
                        </div>
                        <div class="record-amount amount-in">+450.00</div>
                    </div>
                    <div class="record-item">
                        <div class="record-left">
                            <div class="record-icon">🛠️</div>
                            <div>
                                <div class="record-name">API接口自动化维护支出</div>
                                <div class="record-time">08:00</div>
                            </div>
                        </div>
                        <div class="record-amount amount-out">-50.00</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="home-indicator">
            <div class="home-bar"></div>
        </div>
    </div>
</body>
</html>
