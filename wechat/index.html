<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信-消息</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <div class="status-bar" style="background-color: #ededed; color: #000;">
            <div class="status-left">1:28</div>
            <div class="status-right"><span style="color: #000;">5G</span><div class="battery" style="border-color: #000;"><div class="battery-level" style="background-color: #000;"></div></div></div>
        </div>
        
        <div class="app-header wechat-header">
            <a href="../home.html" class="back-btn" style="position: absolute; left: 15px; text-decoration: none;">◁ 退出</a>
            <div>微信(8)</div>
        </div>
        
        <div class="wechat-search-bar"><div class="wechat-search-box">🔍 搜索</div></div>

        <div class="app-content wechat-bg">
            <div class="chat-list-item pinned">
                <div class="chat-avatar">🌸<div class="badge">2</div></div>
                <div class="chat-meta">
                    <div class="chat-name-row"><span class="chat-user-name">姐姐 ❤️</span><span class="chat-item-time">18:42</span></div>
                    <div class="chat-preview-msg">好滴，等你下课~ 给你带了小...</div>
                </div>
            </div>

            <div class="chat-list-item">
                <div class="chat-avatar">👨‍🏫</div>
                <div class="chat-meta">
                    <div class="chat-name-row"><span class="chat-user-name">王教授（近代物理）</span><span class="chat-item-time">昨天</span></div>
                    <div class="chat-preview-msg">论文初稿下周五前发我邮箱</div>
                </div>
            </div>

            <div class="chat-list-item">
                <div class="chat-avatar">🎓</div>
                <div class="chat-meta">
                    <div class="chat-name-row"><span class="chat-user-name">李浩（同班）</span><span class="chat-item-time">昨天</span></div>
                    <div class="chat-preview-msg">实验报告借我抄抄 🥤</div>
                </div>
            </div>

            <div class="chat-list-item">
                <div class="chat-avatar">👩</div>
                <div class="chat-meta">
                    <div class="chat-name-row"><span class="chat-user-name">母亲</span><span class="chat-item-time">周三</span></div>
                    <div class="chat-preview-msg">这周末回家吗？妈给你炖排骨</div>
                </div>
            </div>
        </div>
        
        <div class="wechat-footer-nav">
            <a href="list.html" class="wechat-nav-item active">
                <div class="wechat-nav-icon">💬</div><div>微信</div>
            </a>
            <a href="contacts.html" class="wechat-nav-item">
                <div class="wechat-nav-icon">📇</div><div>通讯录</div>
            </a>
            <a href="moments.html" class="wechat-nav-item">
                <div class="wechat-nav-icon">🧭</div><div>发现</div>
            </a>
        </div>

        <div class="home-indicator" style="background-color: #f7f7f7;"><div class="home-bar" style="background-color: #000;"></div></div>
    </div>
</body>
</html>
