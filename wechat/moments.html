<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信-朋友圈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <div class="status-bar" style="background-color: #3a3a3c; color: #fff;">
            <div class="status-left">1:30</div>
            <div class="status-right"><span>5G</span><div class="battery"><div class="battery-level"></div></div></div>
        </div>
        
        <div class="app-content moments-container">
            <div class="moments-header-art">
                <div class="moments-my-name">物理怪人Bot</div>
                <div class="moments-my-avatar">🤖</div>
            </div>

            <div class="feed-list">
                
                <div class="feed-item">
                    <div class="feed-avatar">👨‍🏫</div>
                    <div class="feed-body">
                        <div class="feed-username">王教授（近代物理）</div>
                        <div class="feed-text">“格物致知，诚意正心。” 看到今年带的几个本科生实验数据做得这么漂亮，熬夜改论文也不觉得累了。</div>
                        <div class="feed-media-mock">📊 链接：近代物理国家重点实验室年度汇报摘要</div>
                        <div class="feed-time-row"><span>2小时前</span><span class="feed-action-btn">💬</span></div>
                        <div class="feed-comment-box">
                            <div class="comment-like-line">❤️ 李浩，学长-赵明远</div>
                            <div><strong>学长-赵明远：</strong> 教授辛苦了！我们一定继续努力！</div>
                        </div>
                    </div>
                </div>

                <div class="feed-item">
                    <div class="feed-avatar">👨</div>
                    <div class="feed-body">
                        <div class="feed-username">父亲</div>
                        <div class="feed-text">今天在小区楼下遇到的小流浪，看这小眼神，像不像催着要加餐？[嘿哈]</div>
                        <div class="feed-media-img" style="background-color: #fbeee6;">🐱</div>
                        <div class="feed-time-row"><span>5小时前</span><span class="feed-action-btn">💬</span></div>
                        <div class="feed-comment-box">
                            <div><strong>母亲：</strong> 脏不脏啊，你别去乱摸，带点猫粮喂喂就行。</div>
                            <div><strong>姐姐 ❤️：</strong> 哇，太萌了吧！爆舔！！</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        
        <div class="wechat-footer-nav">
            <a href="list.html" class="wechat-nav-item">
                <div class="wechat-nav-icon">💬</div><div>微信</div>
            </a>
            <a href="contacts.html" class="wechat-nav-item">
                <div class="wechat-nav-icon">📇</div><div>通讯录</div>
            </a>
            <a href="moments.html" class="wechat-nav-item active">
                <div class="wechat-nav-icon">🧭</div><div>发现</div>
            </a>
        </div>
        <div class="home-indicator" style="background-color: #f7f7f7;"><div class="home-bar" style="background-color: #000;"></div></div>
    </div>
</body>
</html>
