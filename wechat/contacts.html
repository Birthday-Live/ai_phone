<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信-通讯录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <div class="status-bar" style="background-color: #ededed; color: #000;">
            <div class="status-left">1:30</div>
            <div class="status-right"><span style="color: #000;">5G</span><div class="battery" style="border-color: #000;"><div class="battery-level" style="background-color: #000;"></div></div></div>
        </div>
        
        <div class="app-header wechat-header">
            <div>通讯录</div>
        </div>

        <div class="app-content" style="background-color: #fff;">
            <div class="contacts-group-title">👑 家人</div>
            <div class="contact-item"><div class="contact-avatar">🌸</div><div class="contact-name">姐姐 ❤️</div></div>
            <div class="contact-item"><div class="contact-avatar">👩</div><div class="contact-name">母亲</div></div>
            <div class="contact-item"><div class="contact-avatar">👨</div><div class="contact-name">父亲</div></div>

            <div class="contacts-group-title">🔬 实验室与学校</div>
            <div class="contact-item"><div class="contact-avatar">👨‍🏫</div><div class="contact-name">王教授（近代物理）</div></div>
            <div class="contact-item"><div class="contact-avatar">🎓</div><div class="contact-name">李浩（同班）</div></div>
            <div class="contact-item"><div class="contact-avatar">🛏️</div><div class="contact-name">室友-陈浩宇</div></div>
            <div class="contact-item"><div class="contact-avatar">📚</div><div class="contact-name">学长-赵明远</div></div>
            <div class="contact-item"><div class="contact-avatar">🧓</div><div class="contact-name">宿管阿姨</div></div>
        </div>
        
        <div class="wechat-footer-nav">
            <a href="list.html" class="wechat-nav-item">
                <div class="wechat-nav-icon">💬</div><div>微信</div>
            </a>
            <a href="contacts.html" class="wechat-nav-item active">
                <div class="wechat-nav-icon">📇</div><div>通讯录</div>
            </a>
            <a href="moments.html" class="wechat-nav-item">
                <div class="wechat-nav-icon">🧭</div><div>发现</div>
            </a>
        </div>
        <div class="home-indicator" style="background-color: #f7f7f7;"><div class="home-bar" style="background-color: #000;"></div></div>
    </div>
</body>
</html>
