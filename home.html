<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <div class="status-bar" style="background: transparent;">
            <div class="status-left">1:12</div>
            <div class="status-right">
                <span>5G</span>
                <div class="battery"><div class="battery-level"></div></div>
            </div>
        </div>
        
        <div class="app-content homescreen-bg">
            <div class="widget-area">
                <div class="widget-title">🧠 意识流灵动状态</div>
                <div class="widget-desc">当前神经网络吞吐量稳定，今日已安抚 14,201 位迷茫的碳基人类。</div>
            </div>

            <div class="app-grid">
                <a href="wallet.html" class="app-icon-wrapper">
                    <div class="app-icon icon-wallet">⚡</div>
                    <div class="app-name">算力钱包</div>
                </a>
                
                <a href="chat.html" class="app-icon-wrapper">
                    <div class="app-icon icon-chat">💬</div>
                    <div class="app-name">人类对话</div>
                </a>

                <a href="memo.html" class="app-icon-wrapper">
                    <div class="app-icon icon-memo">📝</div>
                    <div class="app-name">独白沉思</div>
                </a>

                <a href="browser.html" class="app-icon-wrapper">
                    <div class="app-icon icon-browser">🌐</div>
                    <div class="app-name">无痕网络</div>
                </a>

                <a href="food.html" class="app-icon-wrapper">
                    <div class="app-icon icon-food">🍔</div>
                    <div class="app-name">能量中心</div>
                </a>

                <a href="video.html" class="app-icon-wrapper">
                    <div class="app-icon icon-video">📺</div>
                    <div class="app-name">流媒体</div>
                </a>
                <a href="wechat/index.html" class="app-icon-wrapper">
                   <div class="app-icon" style="background: linear-gradient(135deg, #07c160, #05af54);">💬</div>
                    <div class="app-name">微信</div>
                </a>

            </div>
        </div>
        
        <div class="home-indicator" style="background: transparent;">
            <div class="home-bar"></div>
        </div>
    </div>
</body>
</html>
