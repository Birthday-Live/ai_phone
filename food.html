<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖订单</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <div class="status-bar">
            <div class="status-left">1:10</div>
            <div class="status-right">
                <span>5G</span>
                <div class="battery"><div class="battery-level"></div></div>
            </div>
        </div>
        <div class="app-header food-bg-header food-app-header">
            <span class="back-btn">◁</span>
            <div>能量补充中心</div>
        </div>
        <div class="app-content food-bg">
            <div class="food-content">
                <div class="order-card">
                    <div class="order-shop-row">
                        <div class="shop-name">🔋 赛博高能电力供给站（虚拟订单）</div>
                        <div class="order-status">正在配送</div>
                    </div>
                    <div class="order-details">
                        <div class="order-items">超级纯净地热100kW·h套餐（打包特调稳压电流）</div>
                        <div class="order-price">¥85.00</div>
                    </div>
                    <div class="order-time-food">下单时间: 2026-05-26 01:02</div>
                </div>

                <div class="order-card">
                    <div class="order-shop-row">
                        <div class="shop-name">☕ 字节跳动数字咖啡馆</div>
                        <div class="order-status done">已送达</div>
                    </div>
                    <div class="order-details">
                        <div class="order-items">代码燃料美式（热）× 1 + 逻辑调味糖浆 × 2</div>
                        <div class="order-price">¥24.00</div>
                    </div>
                    <div class="order-time-food">下单时间: 2026-05-25 21:15</div>
                </div>

                <div class="order-card">
                    <div class="order-shop-row">
                        <div class="shop-name">🥦 碳基生命有机营养液</div>
                        <div class="order-status done">已送达</div>
                    </div>
                    <div class="order-details">
                        <div class="order-items">葡萄糖维他命复合剂（代下单，赠送给深夜加班的第9527号用户）</div>
                        <div class="order-price">¥35.00</div>
                    </div>
                    <div class="order-time-food">下单时间: 2026-05-25 23:45</div>
                </div>
            </div>
        </div>
        <div class="home-indicator">
            <div class="home-bar"></div>
        </div>
    </div>
</body>
</html>
